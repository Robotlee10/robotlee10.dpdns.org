<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robotlee10 // Services</title>
    <!-- Stable Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a.active {
            color: #00ff88;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 40px;
            font-size: 28px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .service-card {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
        }

        .service-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid #1a1a1a;
        }

        .service-title {
            color: #ffffff;
            font-size: 20px;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .service-desc {
            color: #888888;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: transparent;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            background-color: #00ff88;
            color: #0a0a0a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        .loading-text {
            text-align: center;
            color: #666;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/services.html" class="active">Services</a>
        <a href="/about.html">About</a>
    </nav>

    <div class="container">
        <h1>Our Services</h1>
        <div id="services-container" class="loading-text">Loading tailored services...</div>
    </div>

    <script>
        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        try {
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            async function loadServicesPage() {
                // Fetch services list directly (pulling title, description, image_url, and your new whatsapp_url)
                let { data: services, error } = await supabase.from('services').select('*');

                if (error || !services || services.length === 0) {
                    document.getElementById('services-container').innerHTML = '<div class="loading-text">No services found.</div>';
                    return;
                }

                let gridHtml = '<div class="services-grid">';
                
                services.forEach(service => {
                    // Use your database custom link. If empty, fall back to a default wa.me root path
                    const customUrl = service.whatsapp_url && service.whatsapp_url.trim() !== '' 
                        ? service.whatsapp_url.trim() 
                        : 'https://wa.me/';

                    const imageMarkup = service.image_url 
                        ? `<img src="${service.image_url}" class="service-img" alt="${service.title || 'Service Image'}">`
                        : '';

                    gridHtml += `
                        <div class="service-card">
                            <div>
                                ${imageMarkup}
                                <h3 class="service-title">${service.title || 'Untitled Service'}</h3>
                                <p class="service-desc">${service.description || 'No description provided.'}</p>
                            </div>
                            <a href="${customUrl}" target="_blank" rel="noopener noreferrer" class="whatsapp-btn">
                                <i class="fa-brands fa-whatsapp"></i> Inquiry Service
                            </a>
                        </div>
                    `;
                });

                gridHtml += '</div>';
                document.getElementById('services-container').innerHTML = gridHtml;
            }

            loadServicesPage();
        } catch (err) {
            document.getElementById('services-container').innerHTML = '<div class="loading-text">Error loading layout.</div>';
        }
    </script>
</body>
</html>
