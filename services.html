<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robotlee10 // Services</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a.active {
            color: #00ff88;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .service-card {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .service-card:hover {
            border-color: #00ff88;
        }

        .service-card h3 {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-size: 20px;
            letter-spacing: 0.5px;
        }

        .service-card p {
            margin: 0;
            line-height: 1.6;
            color: #888888;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/services.html" class="active">Services</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <h1>Services</h1>
        
        <div id="services-container"></div>
    </div>

    <script>
        const container = document.getElementById('services-container');

        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        try {
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            async function loadServices() {
                let { data: services, error } = await supabase
                    .from('services')
                    .select('*');

                if (error) {
                    container.innerHTML = `<div style="color: #ff3333; text-align: center;">❌ Error loading services.</div>`;
                    return;
                }

                if (!services || services.length === 0) {
                    return; 
                }

                container.innerHTML = services.map(service => `
                    <div class="service-card">
                        <h3>${service.title}</h3>
                        <p>${service.description}</p>
                    </div>
                `).join('');
            }

            loadServices();

        } catch (err) {
            // Silently handle system errors
        }
    </script>
</body>
</html>
