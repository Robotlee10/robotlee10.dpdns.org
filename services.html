    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),

            background-size: 20px 20px;

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);

        nav a {

        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

        .service-card {
            background-color: #111111;
            border: 1px solid #222222;

            border-color: #00ff88;
        }

        .service-img {
    width: 200px;           /* 🟢 Set your exact custom width here */
    height: 150px;          /* Adjust height to keep proportions nice */
    object-fit: cover;      /* Prevents the image from stretching or distorting */
    border-radius: 6px;
    margin: 0 auto 15px auto; /* Centers the image inside the card */
    display: block;         /* Required for centering with margin auto */
    border: 1px solid #1a1a1a;
        }

;
        }

        .service-title {
            color: #ffffff;
            font-size: 20px;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .service-desc {
            color: #888888;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;

        }

        .whatsapp-btn {

            gap: 10px;

            border: 1px solid #00ff88;
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-family: monospace;
            font-size: 13px;

            text-transform: uppercase;

        }

        .whatsapp-btn:hover {
            background-color: #00ff88;
            color: #0a0a0a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .learn-more-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #0d0d0d;
            color: #666666;
            border: 1px solid #1a1a1a;
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-family: monospace;

            font-weight: bold;
            letter-spacing: 1.5px;

            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .learn-more-btn i {
            font-size: 12px;
            color: #444444;

        }

            background-color: #141414;
        }

        .learn-more-btn:hover i {
            transform: translateX(4px);
            color: #00ff88;
        }

/* 🟢 NEW LOADING ICON STYLES */

    text-align: center;
    padding: 60px 0;
    color: #00ff88; /* Matrix green color */

}

/* Keeps your error messages clean if Supabase fails to connect */

<body>

    <nav>

<div class="container">
    <h1>Our Services</h1>
    <div id="services-container" class="loading-container">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
    </div>
</div>

    <script>
        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        async function loadServicesPage() {
            const container = document.getElementById('services-container');
            
            try {
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

                // 🟢 UPDATED: Only selects records where is_active is true, sorted by sort_order ascending
                // 🟢 UPDATED: Looks for the text string 'active' and sorts by your custom order
                let { data: services, error } = await supabase
                .from('services')
                .select('*')
                .eq('status', 'active')
                .order('sort_order', { ascending: true });
                if (error) {
                    container.innerHTML = `<div class="loading-text" style="color: #ff4444;">Supabase Error: ${error.message}</div>`;
                    return;
                }

                if (!services || services.length === 0) {
                    container.innerHTML = '<div class="loading-text">No active services found.</div>';
                    return;
                }

                let gridHtml = '<div class="services-grid">';
                
                services.forEach(service => {
                    const databaseLink = service.whatsapp_url || service.link_url || '';
                    const customUrl = databaseLink.trim() !== '' ? databaseLink.trim() : 'https://wa.me/';

                    const buttonText = service.cta_text && service.cta_text.trim() !== '' 
                        ? service.cta_text.trim() 
                        : 'Inquiry Service';

                    const learnMoreMarkup = service.subdomain_url && service.subdomain_url.trim() !== ''
                        ? `<a href="${service.subdomain_url.trim()}" target="_blank" rel="noopener noreferrer" class="learn-more-btn">
                            Explore Subdomain <i class="fa-solid fa-arrow-right"></i>
                           </a>`
                        : '';

                    const imageMarkup = service.image_url 
                        ? `<img src="${service.image_url}" class="service-img" alt="${service.title || 'Service Image'}">`
                        : '';

                    gridHtml += `
                        <div class="service-card">
                            <div>
                                ${imageMarkup}
                                <h3 class="service-title">${service.title || 'Untitled Service'}</h3>
                                <p class="service-desc">${service.description || 'No description provided.'}</p>
                            </div>
                            <div class="card-actions">
                                <a href="${customUrl}" target="_blank" rel="noopener noreferrer" class="whatsapp-btn">
                                    <i class="fa-brands fa-whatsapp"></i> ${buttonText}
                                </a>
                                ${learnMoreMarkup}
                            </div>
                        </div>
                    `;
                });

                gridHtml += '</div>';
                container.innerHTML = gridHtml;

            } catch (err) {
                container.innerHTML = `<div class="loading-text" style="color: #ff4444;">Browser Script Error: ${err.message}</div>`;
            }
        }

        loadServicesPage();
    </script>
</body>
