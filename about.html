<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robotlee10 // About</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a.active {
            color: #00ff88;
            font-weight: bold;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Profile Block */
        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
            margin-bottom: 20px;
        }

        h1, h2 {
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 { font-size: 28px; margin-bottom: 10px; }
        h2 { font-size: 18px; border-bottom: 1px solid #222; padding-bottom: 8px; margin-top: 40px; }

        .bio-text {
            line-height: 1.8;
            color: #888888;
            font-size: 16px;
            max-width: 550px;
            margin: 0 auto;
        }

        /* Skills Pill Layout */
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .skill-badge {
            background-color: #111;
            border: 1px solid #222;
            color: #00ff88;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-family: monospace;
        }

        /* Timeline Split Columns */
        .timeline-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .timeline-columns { grid-template-columns: 1fr; }
        }

        .timeline-card {
            background-color: #111111;
            border-left: 2px solid #00ff88;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 15px;
        }

        .timeline-card .year {
            color: #00ff88;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .timeline-card .title {
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
        }

        .timeline-card .inst {
            color: #666666;
            font-size: 13px;
            margin-top: 2px;
        }

        /* Social Icons Wrapper at bottom */
        .icons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-bottom: 20px;
        }

        .social-icon-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 55px;
            height: 55px;
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 50%;
            font-size: 22px;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-icon-btn:hover {
            transform: scale(1.15);
        }

        /* --- CLIENT INTAKE PORTAL FORM STYLING --- */
        .contact-portal {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 30px 25px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .contact-portal h2 {
            border-bottom: none;
            padding-bottom: 0;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 18px;
        }

        .contact-portal p {
            font-size: 14px;
            color: #666666;
            margin: 0 0 20px 0;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-family: monospace;
            font-size: 12px;
            color: #00ff88;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            background-color: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 4px;
            padding: 12px;
            color: #ffffff;
            font-family: sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #00ff88;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
