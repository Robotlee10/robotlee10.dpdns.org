<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robotlee10 // Contact</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a.active {
            color: #00ff88;
            font-weight: bold;
        }

        .container {
            max-width: 500px;
            margin: 80px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* Flex row layout for clean icon placement */
        .icons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* Circular glowing icon button design */
        .social-icon-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 70px;
            height: 70px;
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 50%;
            font-size: 28px; /* Control image/logo size */
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Slight pop animation when hovered */
        .social-icon-btn:hover {
            transform: scale(1.15);
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/services.html">Services</a>
        <a href="/about.html">About</a>
        <a href="/contact.html" class="active">Contact</a>
    </nav>

    <div class="container">
        <h1>Connect</h1>
        
        <div class="icons-wrapper" id="socials-container"></div>
    </div>

    <script>
        const container = document.getElementById('socials-container');

        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        // Helper function to turn table text names into proper icon classes
        function getIconClass(platformName) {
            const name = platformName.toLowerCase().trim();
            if (name.includes('github')) return 'fa-brands fa-github';
            if (name.includes('linkedin')) return 'fa-brands fa-linkedin-in';
            if (name.includes('twitter') || name.includes('x')) return 'fa-brands fa-x-twitter';
            if (name.includes('instagram')) return 'fa-brands fa-instagram';
            if (name.includes('facebook')) return 'fa-brands fa-facebook-f';
            if (name.includes('youtube')) return 'fa-brands fa-youtube';
            if (name.includes('email') || name.includes('mail')) return 'fa-solid fa-envelope';
            return 'fa-solid fa-link'; // Fallback link icon if nothing matches
        }

        try {
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            async function loadSocials() {
                let { data: socials, error } = await supabase
                    .from('socials')
                    .select('*');

                if (error || !socials || socials.length === 0) {
                    return;
                }

                container.innerHTML = socials.map(item => {
                    const accentColor = item.color || '#00ff88';
                    const iconClass = getIconClass(item.platform);
                    
                    return `
                        <a href="${item.url}" 
                           target="_blank" 
                           rel="noopener noreferrer" 
                           class="social-icon-btn"
                           title="${item.platform}"
                           onmouseenter="this.style.borderColor='${accentColor}'; this.style.color='${accentColor}'; this.style.boxShadow='0 0 20px ${accentColor}44';"
                           onmouseleave="this.style.borderColor='#222222'; this.style.color='#ffffff'; this.style.boxShadow='none';">
                           <i class="${iconClass}"></i>
                        </a>
                    `;
                }).join('');
            }

            loadSocials();

        } catch (err) {
            // Buffer
        }
    </script>
</body>
</html>
