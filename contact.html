<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robotlee10 // Contact</title>
    <style>
        :root { --bg-color: #0a0a0c; --text-color: #eaeaea; --accent-color: #00ffaa; --muted-color: #888; --nav-bg: rgba(15, 15, 20, 0.7); }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding-top: 80px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 170, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 170, 0.02) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        nav { position: fixed; top: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; display: flex; justify-content: center; padding: 15px 0; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-size: 0.95rem; font-family: monospace; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-color); }
        .container { text-align: center; max-width: 500px; padding: 40px 20px; width: 100%; box-sizing: border-box; }
        .subtitle { color: var(--accent-color); font-family: monospace; margin-bottom: 25px; }
        
        form { display: flex; flex-direction: column; gap: 15px; text-align: left; margin-top: 25px; }
        label { font-size: 0.85rem; font-family: monospace; color: var(--muted-color); }
        input, textarea {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px; border-radius: 6px;
            color: #fff; font-family: inherit;
        }
        input:focus, textarea:focus { border-color: var(--accent-color); outline: none; }
        button {
            background: var(--accent-color); color: #000;
            border: none; padding: 12px; border-radius: 6px;
            font-weight: bold; cursor: pointer; transition: opacity 0.2s;
            font-family: monospace; margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <nav>
        <div class="nav-links">
            <a href="/">/home</a>
            <a href="/services">/services</a>
            <a href="/about">/about</a>
            <a href="/contact" class="active">/contact</a>
        </div>
    </nav>

    <div class="container">
        <h1>Establish Comms</h1>
        <div class="subtitle">OPEN_CHANNEL //</div>
        
        <!-- You can connect this to Formspree later if you want real emails! -->
        <form>
            <label>IDENTIFICATION (NAME)</label>
            <type input="text" placeholder="John Doe">
            <input type="text" placeholder="Your Name Required">
            
            <label>DIGITAL WAVEFORM (EMAIL)</label>
            <input type="email" placeholder="name@domain.com">
            
            <label>ENCRYPTED MESSAGE</label>
            <textarea rows="4" placeholder="Type your transmission here..."></textarea>
            
            <button type="submit">SEND TRANSMISSION</button>
        </form>
    </div>
</body>
</html>
