    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a.active {
            color: #00ff88;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .logo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.25);
            margin: 0 auto 30px auto;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
        }

        .brand-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #ffffff;
            font-size: 38px;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            font-weight: normal;
        }

        .status-tag {
            color: #00ff88;
            font-family: monospace;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

/* --- DYNAMIC WELCOME MESSAGE STYLE --- */
        .welcome-message {
            color: #e0e0e0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 24px;
            font-weight: 300; /* Extra light font-weight for a modern tech feel */
            letter-spacing: -0.5px;
            line-height: 1.4;
            margin: 0 auto 24px auto;
            max-width: 500px;
            text-transform: uppercase; /* Makes it uppercase like the tags */
        }

        /* --- AUTOMATIC CAROUSEL CARD DISPLAY --- */
        .status-card-carousel {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 30px 25px;
            text-align: center;
            position: relative;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .slide-item {
            display: none;
            width: 100%;
            animation: fadeInOut 0.8s ease-in-out;
        }

        .slide-item.active {
            display: block;
        }

        .headline-text {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .subheadline-text {
            line-height: 1.6;
            color: #888888;
            font-size: 15px;
            margin: 0 auto;
            max-width: 500px;
        }

        /* --- AVAILABILITY BEACON --- */
        .availability-beacon {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            color: #00ff88;
            font-family: monospace;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 6px 16px;
            border-radius: 20px;
            margin: 30px auto 20px auto;
            text-transform: uppercase;
        }

        .beacon-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff88;
        }

        /* --- QUICK-LINK PORTAL MATRIX --- */
        .portal-matrix {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .portal-card {
            flex: 1;
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 18px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .portal-card:hover {
            border-color: #00ff88;
            background-color: rgba(0, 255, 136, 0.02);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.05);
        }

        .portal-arrow {
            color: #00ff88;
            transition: transform 0.3s ease;
        }

        .portal-card:hover .portal-arrow {
            transform: translateX(4px);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .portal-matrix { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="active">Home</a>

        <div class="logo-frame">
            <img src="https://yrpfevxzocpedpthknhi.supabase.co/storage/v1/object/public/robotlee10.dpdns.org/eb1090c3-fbfc-4c85-ad03-229fd22d2f23.jpg" class="brand-logo" alt="Logo">
        </div>
        
        <h1>robotlee10</h1>
        <div class="status-tag">SYSTEM // ONLINE</div>

        <div class="welcome-message" id="welcome-field">Loading greeting...</div>

        <div class="status-card-carousel" id="carousel-box">
            <div class="slide-item active">
                <p style="color: #444;">Connecting secure streams...</p>
            </div>
        </div>

        <div>
            <div class="availability-beacon">
                <span class="beacon-dot"></span>
                Available for Freelance Contracts
            </div>
        </div>

        <div class="portal-matrix">
            <a href="/services.html" class="portal-card">
                <span>Explore Services</span>
                <span class="portal-arrow">→</span>
            </a>
            <a href="/about.html" class="portal-card">
                <span>View Capabilities</span>
                <span class="portal-arrow">→</span>
            </a>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        async function loadHomePage() {
            try {
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                
                // Pulls the latest 10 log rows from the database engine
                let { data: homeRows } = await supabase
                    .from('home')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(10);

                const carouselBox = document.getElementById('carousel-box');

                if (homeRows && homeRows.length > 0) {
                    // 1. Map the new welcome text column from your first row item
                    document.getElementById('welcome-field').innerText = homeRows[0].welcome_text || 'Welcome to my digital outpost.';

                    // 2. Loop through all existing rows to construct carousel cards
                    let combinedHtml = '';
                    homeRows.forEach((row, index) => {
                        const activeClass = index === 0 ? 'active' : '';
                        combinedHtml += `
                            <div class="slide-item ${activeClass}">
                                <div class="headline-text">${row.headline || ''}</div>
                                <div class="subheadline-text">${row.subheadline || ''}</div>
                            </div>
                        `;
                    });

                    carouselBox.innerHTML = combinedHtml;

                    // 3. Initiate rotation loop if multiple records exist
                    if (homeRows.length > 1) {
                        initAutomaticRotation();
                    }
                } else {
                    // Fail-safe fallbacks if table mapping is not loaded yet
                    document.getElementById('welcome-field').innerText = "Welcome to my digital outpost";
                    carouselBox.innerHTML = `
                        <div class="slide-item active">
                            <div class="headline-text">Engineering Custom Digital Solutions.</div>
                            <div class="subheadline-text">I build clean, high-performance web spaces and test automation systems.</div>
                        </div>
                    `;
                }
            } catch (err) {}
        }

        // Card Rotation Logic
        function initAutomaticRotation() {
            let currentSlideIndex = 0;
            
            setInterval(() => {
                const slides = document.querySelectorAll('.slide-item');
                if (slides.length <= 1) return;

                slides[currentSlideIndex].classList.remove('active');
                currentSlideIndex = (currentSlideIndex + 1) % slides.length;
                slides[currentSlideIndex].classList.add('active');
            }, 5000); // Transitions to next status row every 5 seconds
        }

        loadHomePage();
    </script>
</body>
</html>
