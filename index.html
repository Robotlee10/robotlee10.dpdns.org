<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a.active {
            color: #00ff88;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .logo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.25);
            margin: 0 auto 30px auto;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
        }

        .brand-logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #ffffff;
            font-size: 38px;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
            font-weight: normal;
        }

        .status-tag {
            color: #00ff88;
            font-family: monospace;
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .bio-text {
            line-height: 1.8;
            color: #888888;
            font-size: 16px;
            margin-bottom: 40px;
        }

        /* Fixed structural design from screenshot */
        .status-card {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 25px;
            text-align: left;
            overflow: hidden; /* Keeps ticker bounds clean */
        }

        .status-card h2 {
            color: #ffffff;
            font-size: 18px;
            margin: 0 0 15px 0;
            letter-spacing: 1px;
            font-weight: normal;
        }

        /* The ticker scrolling line viewport */
        .ticker-viewport {
            overflow: hidden;
            white-space: nowrap;
            width: 100%;
        }

        /* Animation styling that moves text automatically sideways if it builds up */
        .ticker-text {
            display: inline-block;
            color: #888888;
            font-size: 15px;
            line-height: 1.6;
            padding-left: 100%;
            animation: statusTicker 25s linear infinite;
        }

        @keyframes statusTicker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="active">Home</a>
        <a href="/services.html">Services</a>
        <a href="/about.html">About</a>
    </nav>

    <div class="container">
        <div class="logo-frame">
            <img src="https://yrpfevxzocpedpthknhi.supabase.co/storage/v1/object/public/robotlee10.dpdns.org/eb1090c3-fbfc-4c85-ad03-229fd22d2f23.jpg" class="brand-logo" alt="Logo">
        </div>
        
        <h1 id="hero-title">robotlee10</h1>
        <div class="status-tag">SYSTEM // ONLINE</div>

        <p class="bio-text" id="hero-subtitle">...</p>

        <div class="status-card">
            <h2>Latest Status</h2>
            <div class="ticker-viewport">
                <span id="status-content" class="ticker-text">Loading secure updates...</span>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://yrpfevxzocpedpthknhi.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycGZldnh6b2NwZWRwdGhrbmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDg5NjIsImV4cCI6MjA5NzUyNDk2Mn0.GMxuE_B17gwzUaqPlaHzwlY20i8XYaMNOoxY9WGijLw';

        async function loadHomePage() {
            try {
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                
                // Fetch latest 5 rows from your home table
                let { data: homeRows } = await supabase
                    .from('home')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);

                if (homeRows && homeRows.length > 0) {
                    // Bio always tracks your most recent row's subheadline
                    document.getElementById('hero-subtitle').innerText = homeRows[0].subheadline || '';

                    // Combines all your different status headlines separated by distinct spacer hashes
                    const combinedStatus = homeRows
                        .map(row => row.headline)
                        .filter(text => text)
                        .join('  ///  ');

                    document.getElementById('status-content').innerText = combinedStatus;
                } else {
                    document.getElementById('hero-subtitle').innerText = "Welcome to my digital outpost. I build clean, high-performance web spaces and test automation systems.";
                    document.getElementById('status-content').innerText = "Deploying multi-page core architecture via Vercel pipeline successfully.";
                }
            } catch (err) {}
        }

        loadHomePage();
    </script>
</body>
</html>
