<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>robotlee10 // Home</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #eaeaea;
            --accent-color: #00ffaa;
            --muted-color: #888;
            --nav-bg: rgba(15, 15, 20, 0.7);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding-top: 80px; /* Space for fixed nav */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 170, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 170, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* Navigation Bar */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
            display: flex;
            justify-content: center;
            padding: 15px 0;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.95rem;
            font-family: monospace;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-color);
        }

        /* Main Content Container */
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }

        .avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.2);
            margin-bottom: 20px;
        }

        h1 { font-size: 2.2rem; margin: 0 0 10px 0; }
        .subtitle { color: var(--accent-color); font-family: monospace; margin-bottom: 25px; }
        p { color: var(--muted-color); line-height: 1.6; }
        
        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            text-align: left;
        }
        
        .card h3 { margin: 0 0 10px 0; color: #fff; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <nav>
        <div class="nav-links">
            <a href="/" class="active">/home</a>
            <a href="/services">/services</a>
            <a href="/about">/about</a>
            <a href="/contact">/contact</a>
        </div>
    </nav>

    <div class="container">
        <img class="avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=robotlee" alt="Robot Avatar">
        <h1>robotlee10</h1>
        <div class="subtitle">SYSTEM://ONLINE</div>
        <p>Welcome to my digital outpost. I build clean, high-performance web spaces and test automation systems.</p>
        
        <div class="card-grid">
            <div class="card">
                <h3>Latest Status</h3>
                <p>Deploying multi-page core architecture via Vercel pipeline successfully.</p>
            </div>
        </div>
    </div>

</body>
</html>
