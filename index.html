            letter-spacing: -1px;

        @media (max-width: 600px) {

        }

        .subtitle {
            color: #888888;
            font-size: 18px;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 40px auto;
        }

        .cta-group {
            display: flex;
            justify-content: center;

                document.getElementById('hero-title').innerText = metrics.headline || '';
                document.getElementById('hero-subtitle').innerText = metrics.subheadline || '';

            } catch (err) {}
        }

        loadHomePage();
